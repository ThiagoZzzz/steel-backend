        created_at:
          type: string
          format: date-time

    CreateProductRequest:
      type: object
      required: [name, price, image]
      properties:
        name:
          type: string
          minLength: 3
          example: Camiseta STEEL
        price:
          type: number
          minimum: 0
          example: 4999.99
        stock:
          type: integer
          minimum: 0
          example: 25
          description: Opcional (default 0)
        description:
          type: string
          minLength: 10
          nullable: true
          example: Camiseta premium de algodÃģn peinado
          description: Opcional â mÃ­n. 10 caracteres si se envÃ­a
        image:
          type: string
          format: binary
          description: "Archivo de imagen (jpg, png, jpeg, webp â mÃĄx 5MB). Se sube a Cloudinary."
        category:
          type: string
          minLength: 3
          nullable: true
          example: camisetas
          description: Opcional â mÃ­n. 3 caracteres si se envÃ­a
        discount:
          type: boolean
          example: false
          description: Opcional (default false)
        featured:
          type: boolean
          example: false
          description: Opcional (default false)

    # âââ Order ââââââââââââââââââââââââââââââââââââââââââ
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_number:
          type: string
