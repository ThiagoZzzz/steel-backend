          example: NuevaSegura456!
        confirmPassword:
          type: string
          example: NuevaSegura456!

    RoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [user, admin]
          example: admin

    # âââ Product ââââââââââââââââââââââââââââââââââââââââ
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Slug SEO-friendly auto-generado a partir del nombre (nombre-xxxxx)
