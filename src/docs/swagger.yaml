        El servidor resuelve precios desde la DB, calcula los sub_totals
        y el total en una **transacciÃģn atÃģmica**.
        El `user_email` se toma automÃĄticamente del usuario autenticado.

    UpdateOrderRequest:
      type: object
      description: DebÃĐs enviar al menos uno de los campos. Solo administradores.
      properties:
        total:
          type: number
          minimum: 0
