                      updatedAt: "2026-03-27T20:00:00.000Z"
                    - id: "item-uuid-002"
                      order_id: "ord-uuid-001"
                      product_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                      product_name: "Pantalón Cargo"
                      quantity: 1
                      sub_total: 4999.99
                      createdAt: "2026-03-27T20:00:00.000Z"
                      updatedAt: "2026-03-27T20:00:00.000Z"
        "401":
          description: No autenticado
