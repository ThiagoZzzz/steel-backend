        sub_total:
          type: number
          format: float
          example: 9999.98
          description: Calculado automÃĄticamente (price Ã quantity)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderItemInput:
      type: object
      required: [product_id, quantity]
