  /auth/refresh:
    post:
      tags: ["ð PÃšblico Â· Auth"]
      summary: Renovar access token
      description: |
        Renueva el **access token** usando el **refresh token** almacenado en la
        cookie `httpOnly` del navegador (seteada automÃĄticamente en el login).

        **Flujo de rotaciÃģn:**
        1. El servidor verifica el `refreshToken` de la cookie
        2. Genera un nuevo **access token** (2h) y un nuevo **refresh token** (7d)
        3. El nuevo refresh token se setea en la cookie `httpOnly` (reemplazando el anterior)
        4. El nuevo access token se devuelve en el body

        **No requiere `Authorization` header** â solo necesita la cookie `refreshToken`.

        **Errores posibles:**
        - `401` si no hay cookie, si el token es invÃĄlido o si ya expirÃģ
      parameters:
        - in: cookie
          name: refreshToken
          required: true
          schema:
            type: string
          description: Refresh token JWT (7 dÃ­as). Seteado automÃĄticamente en el login.
      responses:
        "200":
          description: Nuevos tokens generados correctamente
          headers:
            Set-Cookie:
              description: |
                Nuevo refresh token en cookie `httpOnly; Secure; SameSite=Strict`.
                Expira en 7 dÃ­as.
              schema:
                type: string
                example: "refreshToken=eyJ...; HttpOnly; Secure; SameSite=Strict; Max-Age=604800"
          content:
            application/json:
              example:
                status: success
                message: Nuevos tokens obtenidos correctamente
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...(2h)"
        "401":
          description: Refresh token ausente, invÃĄlido o expirado
          content:
            application/json:
              examples:
                sin_token:
                  summary: Sin cookie refreshToken
                  value:
                    status: error
                    message: Refresh token no proporcionado.
                token_expirado:
                  summary: Token expirado
                  value:
                    status: error
                    message: Refresh token expirado.
                token_invalido:
                  summary: Token invÃĄlido
                  value:
                    status: error
                    message: Refresh token invÃĄlido.

