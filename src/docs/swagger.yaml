  /auth/logout:
    post:
      tags: ["ð PÃšblico Â· Auth"]
      summary: Cerrar sesiÃģn
      description: |
        Cierra la sesiÃģn del usuario eliminando la cookie `refreshToken`.
        **No requiere `Authorization` header** â elimina la cookie `httpOnly` del navegador.
