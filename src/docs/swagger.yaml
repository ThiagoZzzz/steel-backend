openapi: 3.0.3
info:
  title: STEEL E-Commerce API
  description: |
    API REST para la plataforma de e-commerce **STEEL**.

    ## AutenticaciÃģn
    La mayorÃ­a de los endpoints requieren un **access token** JWT en el header `Authorization`:
    ```
    Authorization: Bearer <tu_access_token>
    ```
    ObtenÃĐ tu token mediante `POST /auth/login`. El access token expira en **2 horas**.

    ## Refresh Token
    Cuando el access token expira, usÃĄ `POST /auth/refresh` para obtener nuevos tokens sin
    volver a ingresar credenciales. El refresh token se almacena en una cookie `httpOnly`
    (expira en **7 dÃ­as**) y se rota con cada uso.

    ## Roles y acceso
    | Rol | DescripciÃģn |
    |-----|-------------|
    | **pÃšblico** | Sin autenticaciÃģn requerida |
    | **user** | Usuario registrado â requiere JWT con rol `user` |
    | **admin** | Administrador â requiere JWT con rol `admin` |

    ## OrganizaciÃģn
    Los endpoints estÃĄn agrupados por **rol requerido**, y dentro de cada grupo
    ordenados por verbo HTTP: `GET â PATCH â POST â DELETE`.
