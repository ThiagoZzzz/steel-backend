        name:
          type: string
          description: Nombre del producto (snapshot para el item)
          example: Camiseta STEEL

    BillingDetails:
      type: object
      description: |
        Datos de facturaciÃģn del cliente. Estructura libre (JSONB).
        Ejemplos de campos comunes: address, city, zip, phone.
      properties:
        address:
          type: string
          example: "Av. Corrientes 1234"
        city:
          type: string
          example: "Buenos Aires"
        zip:
          type: string
          example: "C1043AAZ"
        phone:
          type: string
          example: "+5491155551234"

    CreateOrderRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
