  /users/:
    get:
      tags: ["🛡️ Admin · Users"]
      summary: Listar todos los usuarios
      description: Devuelve la lista completa de usuarios con soporte para filtrado, ordenamiento y paginación. **Solo administradores.**
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema: { type: string }
          description: "Búsqueda parcial en nombre, apellido y email (ej. ?search=juan)."
        - in: query
          name: name
          schema: { type: string }
          description: "Filtrar por nombre exacto."
        - in: query
          name: last_name
          schema: { type: string }
          description: "Filtrar por apellido exacto."
        - in: query
          name: email
          schema: { type: string }
          description: "Filtrar por email exacto."
        - in: query
          name: sort
          schema: { type: string, example: "-created_at" }
          description: "Criterio de ordenamiento. Campos: name, last_name, email, created_at. Prefijo '-' para DESC."
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: "Número de página."
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: "Cantidad de elementos por página."
      responses:
        "200":
          description: Listado obtenido correctamente
          content:
