                data:
                  orderItems:
                    - id: "item-uuid-001"
                      order_id: "ord-uuid-001"
                      product_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      product_name: "Camiseta STEEL"
                      quantity: 2
                      sub_total: 9999.98
