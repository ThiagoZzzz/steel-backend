        name:
          type: string
          example: Camiseta STEEL
        description:
          type: string
          nullable: true
          example: Camiseta premium de algodÃģn peinado
        image:
          type: string
          format: uri
          example: https://res.cloudinary.com/steel/image/upload/v1/uploads/camiseta.jpg
        price:
          type: number
